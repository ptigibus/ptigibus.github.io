<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c83a13" />
    <link rel="icon" type="image/png" href="/redbus.png" />
    <link rel="apple-touch-icon" href="/redbus.png" />
    <title>Redbus ChatoStBo</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      img.logo {
        width: 96px;
        height: 96px;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 2.5rem;
        margin: 0 0 .5rem;
        font-weight: 600;
        color: #c83a13;
      }
      p.tagline {
        margin: 0 0 2.5rem;
        color: #64748b;
        font-size: 1rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        max-width: 24rem;
      }
      a.btn {
        display: block;
        padding: 1rem 1.25rem;
        border-radius: .75rem;
        text-decoration: none;
        font-size: 1.125rem;
        font-weight: 500;
        color: white;
        background: #c83a13;
        transition: background .15s ease;
      }
      a.btn:hover { background: #a82d0a; }
      a.btn.secondary { background: #475569; }
      a.btn.secondary:hover { background: #334155; }
      footer {
        margin-top: 3rem;
        font-size: .75rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/redbus.png" alt="Redbus" />
      <h1>Redbus ChatoStBo</h1>
      <p class="tagline">Réservation des trajets scolaires</p>
      <div class="links">
        <a class="btn" href="/app/">Application</a>
        <a class="btn secondary" href="/admin/">Administration</a>
      </div>
      <footer>Redbus ChatoStBo</footer>
    </main>
  </body>
</html>
